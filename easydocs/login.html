<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
    <title>Login | EasyDocs</title>
</head>
<body class="bg">
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="navbar-left">
            <img src="assets/logo.png" alt="logo" id="logo">
                <div class="navbar-brand">
                    <h1 class="logo">EasyDocs</h1>
                    <span class="tagline">Share.Learn.Grow.</span>
                </div>
        </div>
        <div class="navbar-center">
        </div>
        <div class="navbar-right">
            <a href="index.html" id="homeLink">Home</a>
            <a href="signup.html" id="signupLink">Sign Up</a> 
        </div>
    </header>
    <!-- MAIN CONTENT -->
    <main class="login-page">
        <section class="login-card">
            <h1>Login to your account</h1>
            <p>Welcome back! Log in to continue sharing and downloading resources.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
            <button type="submit" id="loginBtn">Login</button>
            <p class="login-footer">
                Don't have an account?
                <a href="signup.html">Sign Up</a>
            </p>
         </form>
        </section>
    </main>
    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 EasyDocs.</p>
    </footer>
    <div id="toast-container"></div>
    <script type="module" src="js/pages/login.js"></script>
</body>
</html>
